name: champonboard-dev

services:
  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.runCommand({ping:1})']
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 3s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: ./app
      target: builder
    command: node scripts/seed.ts
    environment:
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB: champonboard
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-deep@championsmail.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-champ-admin-2026}
    depends_on:
      mongo:
        condition: service_healthy

  app:
    build: ./app
    ports:
      - '3000:3000'
    environment:
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB: champonboard
      REDIS_URL: redis://redis:6379
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-google/gemini-3.5-flash}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ORIGIN: ${PUBLIC_BASE_URL:-http://localhost:3000}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      MAIL_FROM: ${MAIL_FROM:-ChampHR <onboarding@offer.championsmail.com>}
      OFFER_MAIL_FROM: ${OFFER_MAIL_FROM:-}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  mongodata:
