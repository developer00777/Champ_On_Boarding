name: champonboard-dev

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: champ
      POSTGRES_PASSWORD: champ
      POSTGRES_DB: champonboard
    ports:
      - '127.0.0.1:5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U champ -d champonboard']
      interval: 3s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '127.0.0.1:9000:9000'
      - '127.0.0.1:9001:9001'
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 3s
      timeout: 3s
      retries: 20

  createbucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/champ-onboard-docs &&
      exit 0
      "

  # One-shot: apply schema + seed company/super admin, then exit.
  migrate:
    build:
      context: ./app
      target: builder
    command: sh -c "npx drizzle-kit push --force && node scripts/seed.ts"
    environment:
      DATABASE_URL: postgres://champ:champ@postgres:5432/champonboard
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-deep@championsmail.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:?set SEED_ADMIN_PASSWORD in .env}
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build: ./app
    restart: unless-stopped
    ports:
      - '127.0.0.1:3100:3000'
    environment:
      DATABASE_URL: postgres://champ:champ@postgres:5432/champonboard
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-google/gemini-3.5-flash}
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      S3_REGION: blr1
      S3_BUCKET: champ-onboard-docs
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_FORCE_PATH_STYLE: 'true'
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ORIGIN: ${ORIGIN:-http://localhost:3000}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      MAIL_FROM: ${MAIL_FROM:-ChampOnboard <onboarding@resend.dev>}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbucket:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
  miniodata:
