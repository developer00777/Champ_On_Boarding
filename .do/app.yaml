# Superseded by Railway + Vercel deployment — kept for reference only.
# Stack: MongoDB (GridFS for file storage) + Redis (sessions + rate limiting).
name: champonboard
region: blr
services:
  - name: web
    source_dir: app
    github:
      repo: CHANGE_ME/HR_Automation_tool
      branch: main
      deploy_on_push: true
    build_command: npm ci && npm run build
    run_command: node build/index.js
    http_port: 3000
    instance_size_slug: basic-xxs
    instance_count: 1
    health_check:
      http_path: /admin/login
    envs:
      - key: ORIGIN
        scope: RUN_TIME
        value: https://onboard.example.com
      - key: PUBLIC_BASE_URL
        scope: RUN_AND_BUILD_TIME
        value: https://onboard.example.com
      - key: MONGODB_URI
        scope: RUN_TIME
        type: SECRET
      - key: MONGODB_DB
        scope: RUN_TIME
        value: champonboard
      - key: REDIS_URL
        scope: RUN_TIME
        type: SECRET
      - key: OPENROUTER_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: OPENROUTER_MODEL
        scope: RUN_TIME
        value: google/gemini-3.5-flash
      - key: ENCRYPTION_KEY
        scope: RUN_TIME
        type: SECRET
      - key: RESEND_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: MAIL_FROM
        scope: RUN_TIME
        value: 'ChampOnboard <onboard@example.com>'
